/* ═══════════════════ AGENT ROW (rich execution log) ═══════════════════ */
function AgentRow({ step, pipeline, index, total, state }) {
  const p = pipeline;
  const running = state==="running", done = state==="done", pending = !running && !done;
  const statusLabel = running ? "RUNNING" : done ? "DONE" : "QUEUED";
  const statusColor = running ? X.amber : done ? X.green : X.t3;
  return (
    <div style={{ display:"flex", gap:11, padding:"14px 0", borderBottom:"1px solid "+X.bdr, opacity:pending?.4:1, transition:"opacity .4s" }}>
      <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:5, flexShrink:0, width:40 }}>
        <div style={{ width:38, height:38, borderRadius:11,
          background:done?p.bg:running?X.amberB:X.surf,
          display:"flex", alignItems:"center", justifyContent:"center", fontSize:17,
          border:running?"2px solid "+X.amber:"1.5px solid "+(done?p.color:X.bdr),
          animation:running?"pulse 1.5s infinite":"none" }}>
          {running ? <span style={{ animation:"spin 1s linear infinite", display:"inline-block" }}>{"\u2699\uFE0F"}</span> : p.icon}
        </div>
        <div style={{ fontSize:8.5, fontWeight:800, color:done?p.color:X.t3, fontFamily:mono }}>{index+1}/{total}</div>
      </div>

      <div style={{ flex:1, minWidth:0 }}>
        <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:(running||done)?8:0, flexWrap:"wrap" }}>
          <span style={{ fontWeight:800, fontSize:12.5, color:done?p.color:X.t1 }}>{p.agent}</span>
          <span style={{ fontSize:8.5, fontWeight:700, padding:"2px 7px", borderRadius:5, background:p.bg, color:p.color }}>{p.diff.length>34?p.diff.slice(0,32)+"\u2026":p.diff}</span>
          <span style={{ marginLeft:"auto", fontSize:9, fontWeight:800, color:statusColor, fontFamily:mono, letterSpacing:".04em" }}>{running?"\u25CF ":done?"\u2713 ":"\u00B7 "}{statusLabel}</span>
        </div>

        {(running||done) && (
          <div style={{ display:"flex", flexDirection:"column", gap:7 }}>
            <div style={{ display:"flex", gap:8, alignItems:"flex-start" }}>
              <span style={{ fontSize:7.5, fontWeight:800, color:X.t2, background:X.surf, border:"1px solid "+X.bdr, padding:"3px 6px", borderRadius:5, letterSpacing:".05em", flexShrink:0, marginTop:1, width:84, textAlign:"center" }}>DATA USED</span>
              <span style={{ fontSize:11, color:X.t2, lineHeight:1.5 }}>{step.uses}</span>
            </div>
            <div style={{ display:"flex", gap:8, alignItems:"flex-start" }}>
              <span style={{ fontSize:7.5, fontWeight:800, color:p.color, background:p.bg, border:"1px solid "+p.color+"30", padding:"3px 6px", borderRadius:5, letterSpacing:".05em", flexShrink:0, marginTop:1, width:84, textAlign:"center" }}>ACTION</span>
              <span style={{ fontSize:11, color:X.t1, fontWeight:600, lineHeight:1.5 }}>{step.action}</span>
            </div>
            {done && (
              <div style={{ display:"flex", gap:8, alignItems:"flex-start" }}>
                <span style={{ fontSize:7.5, fontWeight:800, color:X.t3, background:X.card, border:"1px solid "+X.bdr, padding:"3px 6px", borderRadius:5, letterSpacing:".05em", flexShrink:0, marginTop:1, width:84, textAlign:"center" }}>OUTPUT</span>
                <div style={{ flex:1, minWidth:0 }}><DataBlock entries={step.d} color={p.color}/></div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

/* ═══════════════════ ARCHITECTURE DIAGRAM ═══════════════════ */
function ArchDiagram({ active, setActive }) {
  const W=1000, H=320, nodeW=108, nodeH=76, gap=8;
  const n=PIPELINE.length;
  const totalW=n*nodeW+(n-1)*gap;
  const startX=(W-totalW)/2;
  const nodeY=55;
  const kpiY=nodeY+nodeH+38;

  function nx(i){ return startX+i*(nodeW+gap); }

  return (
    <section className="fu" style={{ animationDelay:".15s", margin:"24px 24px 0", background:X.card, borderRadius:18, border:"1px solid "+X.bdr, boxShadow:X.sh, padding:"28px 32px 20px" }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
        <div>
          <div style={{ fontSize:9, fontWeight:700, color:X.coral, letterSpacing:".08em", textTransform:"uppercase", marginBottom:4 }}>Architecture</div>
          <div style={{ fontSize:17, fontWeight:700, color:X.t1 }}>FinNexus Pipeline — {PIPELINE.length} Autonomous Agents</div>
        </div>
        {active!==null && <button onClick={()=>setActive(null)} style={{ fontSize:11, color:X.t3, background:"none", border:"1px solid "+X.bdr, borderRadius:8, padding:"4px 12px", cursor:"pointer" }}>Clear selection &times;</button>}
      </div>

      <svg viewBox={"0 0 "+W+" "+H} style={{ width:"100%", display:"block" }}>
        <text x={W/2} y={20} textAnchor="middle" fontSize="7.5" fontWeight="700" fill={X.t3} letterSpacing=".12em" fontFamily="Inter">PIPELINE — {PIPELINE.length} AUTONOMOUS AGENTS</text>

        {PIPELINE.slice(0,-1).map((_,i)=>{
          const x1=nx(i)+nodeW, x2=nx(i+1), cy=nodeY+nodeH/2;
          return <g key={"line"+i}><line x1={x1} y1={cy} x2={x2} y2={cy} stroke={X.bdr2} strokeWidth="1.5" strokeDasharray="4 3" style={{ animation:"flowDash 1s linear infinite" }}/><polygon points={(x2-2)+","+(cy-4)+" "+(x2+4)+","+cy+" "+(x2-2)+","+(cy+4)} fill={X.bdr2}/></g>;
        })}

        {PIPELINE.map((p,i)=>{
          const x=nx(i), isAct=active===i;
          return (
            <g key={p.id} onClick={()=>setActive(isAct?null:i)} style={{ cursor:"pointer" }}>
              <rect x={x} y={nodeY} width={nodeW} height={nodeH} rx={12} fill={isAct?p.bg:X.surf} stroke={isAct?p.color:X.bdr} strokeWidth={isAct?2:1}/>
              {isAct && <rect x={x-2} y={nodeY-2} width={nodeW+4} height={nodeH+4} rx={14} fill="none" stroke={p.color} strokeWidth="1" opacity=".3"/>}
              <text x={x+nodeW/2} y={nodeY+22} textAnchor="middle" fontSize="15">{p.icon}</text>
              {p.label.split("\n").map((ln,li)=>(
                <text key={li} x={x+nodeW/2} y={nodeY+38+li*11} textAnchor="middle" fontSize="7.5" fontWeight="600" fill={X.t1} fontFamily="Inter">{ln}</text>
              ))}
            </g>
          );
        })}

        {PIPELINE.map((p,i)=>{
          const cx=nx(i)+nodeW/2;
          return (
            <g key={"kpi"+i}>
              <line x1={cx} y1={nodeY+nodeH} x2={cx} y2={kpiY-6} stroke={X.bdr} strokeWidth="1" strokeDasharray="2 2"/>
              <text x={cx} y={kpiY+4} textAnchor="middle" fontSize="6" fontWeight="600" fill={p.color} fontFamily="Inter">{p.kpi.length>25?p.kpi.slice(0,22)+"...":p.kpi}</text>
            </g>
          );
        })}

        <rect x={60} y={H-58} width={W-120} height={50} rx={10} fill={X.surf} stroke={X.bdr} strokeWidth="1"/>
        <text x={W/2} y={H-42} textAnchor="middle" fontSize="7" fontWeight="700" fill={X.t3} letterSpacing=".1em" fontFamily="Inter">ACTIVATION CHANNELS</text>
        {CHANNELS.map((ch,i)=>{
          const chW=(W-160)/CHANNELS.length;
          const cx=80+i*chW+chW/2;
          return (
            <g key={i}>
              <text x={cx} y={H-22} textAnchor="middle" fontSize="12">{ch.icon}</text>
              <text x={cx} y={H-11} textAnchor="middle" fontSize="5.5" fill={X.t2} fontFamily="Inter">{ch.name}</text>
            </g>
          );
        })}
      </svg>

      {active!==null && (
        <div className="fu" style={{ marginTop:16, padding:"20px 24px", background:PIPELINE[active].bg, borderRadius:14, border:"1px solid "+PIPELINE[active].color+"22", display:"flex", gap:20, alignItems:"flex-start" }}>
          <div style={{ fontSize:32 }}>{PIPELINE[active].icon}</div>
          <div style={{ flex:1 }}>
            <div style={{ fontSize:15, fontWeight:700, color:X.t1, marginBottom:6 }}>{PIPELINE[active].agent}</div>
            <div style={{ fontSize:12, color:X.t2, lineHeight:1.6, marginBottom:10 }}>{PIPELINE[active].desc}</div>
            <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
              <Badge text={"Differentiator: "+PIPELINE[active].diff} color={PIPELINE[active].color}/>
              <Badge text={"KPI: "+PIPELINE[active].kpi} color={X.t1} bg={X.t1+"0a"}/>
            </div>
          </div>
        </div>
      )}
    </section>
  );
}

                <div style={{ fontSize:10, color:X.t2, lineHeight:1.3, marginBottom:8 }}>{u.subtitle}</div>
                <div style={{ display:"flex", gap:5, marginBottom:12, flexWrap:"wrap" }}>
                  {badges.slice(0,3).map((b,bi)=><Badge key={bi} text={b} color={bi===0?u.color:X.t2} bg={bi===0?undefined:X.surf} style={{ fontSize:9 }}/>)}
                </div>
                <div style={{ borderTop:"1px solid "+X.bdr, marginBottom:10, paddingTop:10 }}>
                  <div style={{ fontSize:8, fontWeight:700, color:X.t3, letterSpacing:".06em", textTransform:"uppercase", marginBottom:5 }}>Data Sources &middot; {(u.sources||[]).length}</div>
                  <div style={{ display:"flex", flexWrap:"wrap", gap:4 }}>
                    {(u.sources||[]).map((s,si)=><span key={si} style={{ fontSize:8.5, color:X.t2, background:X.surf, border:"1px solid "+X.bdr, borderRadius:6, padding:"2px 6px", display:"inline-flex", alignItems:"center", gap:3 }}><span style={{ fontSize:9.5 }}>{s.icon}</span>{s.name}</span>)}
                  </div>
                </div>
                <button onClick={()=>runDemo(idx)} style={{ width:"100%", padding:"8px", borderRadius:10, border:"none", background:u.color, color:"#fff", fontSize:11, fontWeight:700, cursor:"pointer" }}>Launch Demo &rarr;</button>
              </div>
            );})}
          </div>
        </div>
      )}

      {running!==null && uc && (
        <div style={{ display:"grid", gridTemplateColumns:"340px 1fr", gap:20 }}>
          <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
            <div style={{ background:uc.bg, borderRadius:12, padding:"14px 16px", border:"1px solid "+uc.color+"22" }}>
              <div style={{ fontSize:10, fontWeight:700, color:uc.color, letterSpacing:".04em", marginBottom:8, textTransform:"uppercase" }}>{uc.trigger.title}</div>
              {uc.trigger.signals.map((sig,i)=>(
                <div key={i} className="si" style={{ animationDelay:i*.06+"s", display:"flex", alignItems:"center", gap:8, marginBottom:i<uc.trigger.signals.length-1?6:0 }}>
                  <Badge text={sig.sev} color={sig.sev==="critical"?X.red:sig.sev==="high"?X.amber:X.blue} style={{ fontSize:8, padding:"1.5px 6px" }}/>
                  <div>
                    <div style={{ fontSize:9, color:X.t3, fontWeight:600 }}>{sig.s}</div>
                    <div style={{ fontSize:10, color:X.t1, lineHeight:1.3 }}>{sig.e}</div>
                  </div>
                </div>
              ))}
            </div>
            <div style={{ background:X.card, borderRadius:12, padding:"14px 16px", border:"1px solid "+X.bdr }}>
              <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:10 }}>
                <div style={{ fontSize:10, fontWeight:700, color:X.t1, letterSpacing:".04em", textTransform:"uppercase" }}>Data Sources — Ingested</div>
                <span style={{ fontSize:8.5, fontWeight:700, color:X.cyan, background:X.cyanB, borderRadius:6, padding:"2px 7px" }}>{(uc.sources||[]).length} systems</span>
              </div>
              <div style={{ fontSize:9.5, color:X.t3, lineHeight:1.4, marginBottom:10 }}>Connected via prebuilt connectors &mdash; the Data Ingestion Agent pulls live from these systems.</div>
              <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
                {(uc.sources||[]).map((src,i)=>(
                  <div key={i} className="si" style={{ animationDelay:i*.05+"s", display:"flex", alignItems:"center", gap:6, background:X.surf, border:"1px solid "+X.bdr, borderRadius:8, padding:"5px 9px" }}>
                    <span style={{ fontSize:12 }}>{src.icon}</span>
                    <span style={{ fontSize:10, fontWeight:600, color:X.t1 }}>{src.name}</span>
                  </div>
                ))}
              </div>
            </div>
            <div style={{ background:X.surf, borderRadius:12, padding:"14px 16px", border:"1px solid "+X.bdr }}>
              <div style={{ fontSize:10, fontWeight:700, color:X.t1, marginBottom:8, letterSpacing:".04em", textTransform:"uppercase" }}>Client Profile — 360 View</div>
              {Object.entries(uc.client).map(([k,v])=>(
                <div key={k} style={{ display:"flex", justifyContent:"space-between", fontSize:10.5, marginBottom:3 }}>
                  <span style={{ color:X.t3, fontWeight:500 }}>{k.replace(/([A-Z])/g," $1").replace(/^./,s=>s.toUpperCase())}</span>
                  <span style={{ color:X.t1, fontWeight:600, fontFamily:mono, fontSize:10 }}>{v}</span>
                </div>
              ))}
            </div>
            <div style={{ background:X.surf, borderRadius:12, padding:"14px 16px", border:"1px solid "+X.bdr, flex:1 }}>
              <div style={{ fontSize:10, fontWeight:700, color:X.t1, marginBottom:8, letterSpacing:".04em", textTransform:"uppercase" }}>Agent Pipeline Execution</div>
              <div style={{ height:4, borderRadius:4, background:X.bdr, marginBottom:12, overflow:"hidden" }}>
                <div style={{ height:"100%", width:progress+"%", background:uc.color, borderRadius:4, transition:"width .3s ease" }}/>
              </div>
              {uc.steps.map((st,i)=>{
                const state=stepStates[i]||"pending";
                return (
                  <div key={i} style={{ display:"flex", alignItems:"center", gap:8, marginBottom:6, opacity:state==="pending"?.4:1, transition:"opacity .3s" }}>
                    <div style={{ width:20, height:20, borderRadius:6, background:state==="done"?PIPELINE[i].color+"18":state==="running"?X.coral+"14":X.bdr, display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, flexShrink:0 }}>
                      {state==="done"?"\u2713":state==="running"?<span style={{ display:"inline-block", animation:"spin .8s linear infinite" }}>{"\u2699\uFE0F"}</span>:<span style={{ color:X.t3, fontSize:9 }}>{i+1}</span>}
                    </div>
                    <div style={{ fontSize:10, color:state==="done"?X.t1:X.t3, fontWeight:state==="running"?600:400, flex:1, lineHeight:1.3 }}>{st.t}</div>
                  </div>
                );
              })}
            </div>
          </div>

          <div>
            <div style={{ display:"flex", gap:0, marginBottom:16, borderBottom:"1px solid "+X.bdr }}>
              {[["flow","\uD83E\uDD16 Agent Flow"],["experience","\uD83D\uDCF1 Experience"],["data","\uD83D\uDCCA Data"]].map(([id,label])=>(
                <button key={id} onClick={()=>setDemoTab(id)} style={{ fontSize:11, fontWeight:demoTab===id?700:500, color:demoTab===id?uc.color:X.t3, background:"none", border:"none", borderBottom:demoTab===id?"2px solid "+uc.color:"2px solid transparent", padding:"8px 18px", cursor:"pointer", transition:"all .15s" }}>{label}</button>
              ))}
            </div>

            {demoTab==="flow" && (
              <div style={{ background:X.card, border:"1px solid "+X.bdr, borderRadius:14, padding:"4px 18px 8px", boxShadow:X.sh }}>
                <div style={{ padding:"14px 0 6px" }}>
                  <div style={{ fontSize:13, fontWeight:800, color:X.t1 }}>Agent Pipeline Execution</div>
                  <div style={{ fontSize:10, color:X.t3, marginTop:3, lineHeight:1.4 }}>Each of the {PIPELINE.length} agents runs in order &mdash; showing the <strong style={{ color:X.t2 }}>data it used</strong> and the <strong style={{ color:X.t2 }}>action it took</strong>.</div>
                </div>
                {uc.steps.map((st,i)=>(
                  <AgentRow key={i} step={st} pipeline={PIPELINE[i]} index={i} total={uc.steps.length} state={stepStates[i]||"pending"}/>
                ))}
              </div>
            )}

            {demoTab==="experience" && (
              <div className="fu" style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:16, padding:"20px 0" }}>
                <div style={{ width:340, background:X.surf, borderRadius:16, padding:"14px 16px", border:"1px solid "+X.bdr, boxShadow:X.sh }}>
                  <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:8 }}>
                    <div style={{ width:24, height:24, borderRadius:6, background:"linear-gradient(135deg,"+X.coral+","+X.orange+")", display:"flex", alignItems:"center", justifyContent:"center", fontSize:12, color:"#fff" }}>W</div>
                    <div style={{ fontSize:10, fontWeight:600, color:X.t2 }}>FinNexus &middot; Now</div>
                  </div>
                  <div style={{ fontSize:12, fontWeight:700, color:X.t1, marginBottom:3 }}>{uc.offer.headline}</div>
                  <div style={{ fontSize:11, color:X.t2, lineHeight:1.4 }}>{uc.offer.action}</div>
                </div>
                <div style={{ width:340, background:"linear-gradient(135deg,"+uc.color+"10,"+uc.color+"05)", borderRadius:16, padding:"22px 20px", border:"1px solid "+uc.color+"22" }}>
                  <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:12 }}>
                    <span style={{ fontSize:22 }}>{uc.icon}</span>
                    <div style={{ fontSize:14, fontWeight:700, color:X.t1 }}>{uc.offer.headline}</div>
                  </div>
                  <div style={{ fontSize:12, color:X.t2, lineHeight:1.6, marginBottom:14 }}>{uc.offer.action}</div>
                  <div style={{ background:X.card, borderRadius:10, padding:"10px 14px", marginBottom:14, border:"1px solid "+X.bdr }}>
                    <div style={{ fontSize:10, fontWeight:600, color:X.t3, textTransform:"uppercase", letterSpacing:".04em", marginBottom:4 }}>Exclusive Benefit</div>
                    <div style={{ fontSize:12, fontWeight:700, color:uc.color }}>{uc.offer.benefit}</div>
                  </div>
                  <div style={{ display:"flex", gap:12, marginBottom:14 }}>
                    <div style={{ flex:1, textAlign:"center", background:X.card, borderRadius:10, padding:"10px 8px", border:"1px solid "+X.bdr }}>
                      <div style={{ fontSize:8, color:X.t3, fontWeight:600, textTransform:"uppercase", marginBottom:2 }}>Before</div>
                      <div style={{ fontSize:18, fontWeight:800, color:X.red, fontFamily:mono }}>{uc.result.before}</div>
                      <div style={{ fontSize:9, color:X.t3 }}>{uc.result.metric}</div>
                    </div>
                    <div style={{ flex:1, textAlign:"center", background:X.card, borderRadius:10, padding:"10px 8px", border:"1px solid "+X.bdr }}>
                      <div style={{ fontSize:8, color:X.t3, fontWeight:600, textTransform:"uppercase", marginBottom:2 }}>After</div>
                      <div style={{ fontSize:18, fontWeight:800, color:X.green, fontFamily:mono }}>{uc.result.after}</div>
                      <div style={{ fontSize:9, color:X.t3 }}>{uc.result.metric}</div>
                    </div>
                  </div>
                  {!claimed ? (
                    <button onClick={()=>setClaimed(true)} style={{ width:"100%", padding:"10px", borderRadius:10, border:"none", background:uc.color, color:"#fff", fontSize:12, fontWeight:700, cursor:"pointer" }}>{uc.offer.cta} &rarr;</button>
                  ) : (
                    <div style={{ textAlign:"center", padding:"10px", borderRadius:10, background:X.greenB, border:"1px solid "+X.green+"22" }}>
                      <span style={{ fontSize:16 }}>{"\u2705"}</span>
                      <div style={{ fontSize:12, fontWeight:700, color:X.green, marginTop:2 }}>Action Confirmed</div>
                    </div>
                  )}
                </div>
              </div>
            )}

            {demoTab==="data" && (
              <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                <div style={{ fontSize:10, fontWeight:700, color:X.t3, letterSpacing:".06em", textTransform:"uppercase", marginBottom:4 }}>Pipeline Data Flow</div>
                {uc.steps.map((st,i)=>{
                  const state=stepStates[i]||"pending";
                  if(state==="pending") return null;
                  return (
                    <div key={i} className="si" style={{ animationDelay:i*.04+"s", marginBottom:6 }}>
                      <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:6 }}>
                        <span style={{ fontSize:14 }}>{PIPELINE[i].icon}</span>
                        <span style={{ fontSize:11, fontWeight:700, color:X.t1 }}>{PIPELINE[i].agent}</span>
                        <Badge text={"Step "+(i+1)} color={PIPELINE[i].color} style={{ fontSize:8 }}/>
                      </div>
                      <div style={{ paddingLeft:22, fontSize:10.5, color:X.t2, lineHeight:1.5, marginBottom:8 }}>
                        <div style={{ marginBottom:3 }}><span style={{ fontWeight:700, color:X.t3 }}>Data used &rarr; </span>{st.uses}</div>
                        <div><span style={{ fontWeight:700, color:PIPELINE[i].color }}>Action &rarr; </span><span style={{ color:X.t1, fontWeight:600 }}>{st.action}</span></div>
                      </div>
                      <div style={{ paddingLeft:22 }}><DataBlock entries={st.d} color={PIPELINE[i].color}/></div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>
      )}
    </section>
  );
}

/* ═══════════════════ FOOTER ═══════════════════ */
function Footer() {
  return (
    <footer style={{ margin:"24px 24px 24px", padding:"24px 32px", background:X.card, borderRadius:18, border:"1px solid "+X.bdr, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
      <div style={{ display:"flex", alignItems:"center", gap:12 }}>
        <XperionLogo size={16}/>
        <div style={{ width:1, height:18, background:X.bdr2 }}/>
        <div>
          <div style={{ fontSize:12, fontWeight:700, color:X.t1 }}>FinNexus</div>
          <div style={{ fontSize:10, color:X.t3 }}>An AI Accelerator Enabling Intelligent Engagement, Insights &amp; Personalization for Financial Services</div>
        </div>
      </div>
      <div style={{ fontSize:10, color:X.t3 }}>&copy; 2026 Coforge &middot; xPerion Marketplace &middot; All rights reserved</div>
    </footer>
  );
}

/* ═══════════════════ APP ═══════════════════ */
function App() {
  const [active, setActive] = useState(null);
  return (
    <div style={{ minHeight:"100vh", background:X.bg }}>
      <Header/>
      <Hero/>
      <KpiStrip/>
      <ArchDiagram active={active} setActive={setActive}/>
      <AboutSection/>
      <OutcomesStrip/>
      <DemoSection/>
      <Footer/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
