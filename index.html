/* ═══════════════════ ARCHITECTURE DIAGRAM ═══════════════════ */
function ArchDiagram({ active, setActive }) {
  const W=1000, H=320, nodeW=108, nodeH=76, gap=8;
  const n=PIPELINE.length;
  const totalW=n*nodeW+(n-1)*gap;
  const startX=(W-totalW)/2;
  const nodeY=55;
  const kpiY=nodeY+nodeH+38;

  function nx(i){ return startX+i*(nodeW+gap); }

  return (
    <section className="fu" style={{ animationDelay:".15s", margin:"24px 24px 0", background:X.card, borderRadius:18, border:"1px solid "+X.bdr, boxShadow:X.sh, padding:"28px 32px 20px" }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
        <div>
          <div style={{ fontSize:9, fontWeight:700, color:X.coral, letterSpacing:".08em", textTransform:"uppercase", marginBottom:4 }}>Architecture</div>
          <div style={{ fontSize:17, fontWeight:700, color:X.t1 }}>FinNexus Pipeline — {PIPELINE.length} Autonomous Agents</div>
        </div>
        {active!==null && <button onClick={()=>setActive(null)} style={{ fontSize:11, color:X.t3, background:"none", border:"1px solid "+X.bdr, borderRadius:8, padding:"4px 12px", cursor:"pointer" }}>Clear selection &times;</button>}
      </div>

      <svg viewBox={"0 0 "+W+" "+H} style={{ width:"100%", display:"block" }}>
        <text x={W/2} y={20} textAnchor="middle" fontSize="7.5" fontWeight="700" fill={X.t3} letterSpacing=".12em" fontFamily="Inter">PIPELINE — {PIPELINE.length} AUTONOMOUS AGENTS</text>

        {PIPELINE.slice(0,-1).map((_,i)=>{
          const x1=nx(i)+nodeW, x2=nx(i+1), cy=nodeY+nodeH/2;
          return <g key={"line"+i}><line x1={x1} y1={cy} x2={x2} y2={cy} stroke={X.bdr2} strokeWidth="1.5" strokeDasharray="4 3" style={{ animation:"flowDash 1s linear infinite" }}/><polygon points={(x2-2)+","+(cy-4)+" "+(x2+4)+","+cy+" "+(x2-2)+","+(cy+4)} fill={X.bdr2}/></g>;
        })}

        {PIPELINE.map((p,i)=>{
          const x=nx(i), isAct=active===i;
          return (
            <g key={p.id} onClick={()=>setActive(isAct?null:i)} style={{ cursor:"pointer" }}>
              <rect x={x} y={nodeY} width={nodeW} height={nodeH} rx={12} fill={isAct?p.bg:X.surf} stroke={isAct?p.color:X.bdr} strokeWidth={isAct?2:1}/>
              {isAct && <rect x={x-2} y={nodeY-2} width={nodeW+4} height={nodeH+4} rx={14} fill="none" stroke={p.color} strokeWidth="1" opacity=".3"/>}
              <text x={x+nodeW/2} y={nodeY+22} textAnchor="middle" fontSize="15">{p.icon}</text>
              {p.label.split("\n").map((ln,li)=>(
                <text key={li} x={x+nodeW/2} y={nodeY+38+li*11} textAnchor="middle" fontSize="7.5" fontWeight="600" fill={X.t1} fontFamily="Inter">{ln}</text>
              ))}
            </g>
          );
        })}

        {PIPELINE.map((p,i)=>{
          const cx=nx(i)+nodeW/2;
          return (
            <g key={"kpi"+i}>
              <line x1={cx} y1={nodeY+nodeH} x2={cx} y2={kpiY-6} stroke={X.bdr} strokeWidth="1" strokeDasharray="2 2"/>
              <text x={cx} y={kpiY+4} textAnchor="middle" fontSize="6" fontWeight="600" fill={p.color} fontFamily="Inter">{p.kpi.length>25?p.kpi.slice(0,22)+"...":p.kpi}</text>
            </g>
          );
        })}

        <rect x={60} y={H-58} width={W-120} height={50} rx={10} fill={X.surf} stroke={X.bdr} strokeWidth="1"/>
        <text x={W/2} y={H-42} textAnchor="middle" fontSize="7" fontWeight="700" fill={X.t3} letterSpacing=".1em" fontFamily="Inter">ACTIVATION CHANNELS</text>
        {CHANNELS.map((ch,i)=>{
          const chW=(W-160)/CHANNELS.length;
          const cx=80+i*chW+chW/2;
          return (
            <g key={i}>
              <text x={cx} y={H-22} textAnchor="middle" fontSize="12">{ch.icon}</text>
              <text x={cx} y={H-11} textAnchor="middle" fontSize="5.5" fill={X.t2} fontFamily="Inter">{ch.name}</text>
            </g>
          );
        })}
      </svg>

      {active!==null && (
        <div className="fu" style={{ marginTop:16, padding:"20px 24px", background:PIPELINE[active].bg, borderRadius:14, border:"1px solid "+PIPELINE[active].color+"22", display:"flex", gap:20, alignItems:"flex-start" }}>
          <div style={{ fontSize:32 }}>{PIPELINE[active].icon}</div>
          <div style={{ flex:1 }}>
            <div style={{ fontSize:15, fontWeight:700, color:X.t1, marginBottom:6 }}>{PIPELINE[active].agent}</div>
            <div style={{ fontSize:12, color:X.t2, lineHeight:1.6, marginBottom:10 }}>{PIPELINE[active].desc}</div>
            <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
              <Badge text={"Differentiator: "+PIPELINE[active].diff} color={PIPELINE[active].color}/>
              <Badge text={"KPI: "+PIPELINE[active].kpi} color={X.t1} bg={X.t1+"0a"}/>
            </div>
          </div>
        </div>
      )}
    </section>
  );
}

/* ═══════════════════ DEMO SYSTEM ═══════════════════ */
function DemoSection() {
  const [running, setRunning] = useState(null);
  const [currentStep, setCurrentStep] = useState(-1);
  const [stepStates, setStepStates] = useState([]);
  const [phase, setPhase] = useState("idle");
  const [demoTab, setDemoTab] = useState("flow");
  const [claimed, setClaimed] = useState(false);

  const runDemo = useCallback(async (ucIdx) => {
    const uc = USE_CASES[ucIdx];
    setRunning(ucIdx);
    setPhase("running");
    setDemoTab("flow");
    setClaimed(false);
    setCurrentStep(-1);
    setStepStates(new Array(uc.steps.length).fill("pending"));
    for (let i = 0; i < uc.steps.length; i++) {
      setCurrentStep(i);
      setStepStates(prev => { const n=[...prev]; n[i]="running"; return n; });
      await new Promise(r => setTimeout(r, 800 + Math.random()*500));
      setStepStates(prev => { const n=[...prev]; n[i]="done"; return n; });
    }
    setPhase("done");
    setDemoTab("experience");
  }, []);

  const resetDemo = () => {
    setRunning(null); setPhase("idle"); setCurrentStep(-1); setStepStates([]); setClaimed(false); setDemoTab("flow");
  };

  const uc = running !== null ? USE_CASES[running] : null;
  const progress = uc ? (stepStates.filter(s=>s==="done").length / uc.steps.length)*100 : 0;

  return (
    <section className="fu" style={{ animationDelay:".25s", margin:"24px 24px 0", background:X.card, borderRadius:18, border:"1px solid "+X.bdr, boxShadow:X.sh, padding:"28px 32px" }}>

        <div>
          <div style={{ fontSize:9, fontWeight:700, color:X.coral, letterSpacing:".08em", textTransform:"uppercase", marginBottom:4 }}>Interactive Demo</div>
          <div style={{ fontSize:17, fontWeight:700, color:X.t1 }}>Experience FinNexus in Action</div>
        </div>
        {running!==null && <button onClick={resetDemo} style={{ fontSize:11, color:X.t3, background:"none", border:"1px solid "+X.bdr, borderRadius:8, padding:"5px 14px", cursor:"pointer" }}>&larr; Back to Use Cases</button>}
      </div>

      {running===null && (
        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16 }}>
          {USE_CASES.map((u,i)=>(
            <div key={u.id} className="hover-lift" style={{ border:"1px solid "+X.bdr, borderRadius:14, padding:"22px 24px", cursor:"pointer", background:X.card, transition:"border-color .2s" }}
              onMouseEnter={e=>e.currentTarget.style.borderColor=u.color} onMouseLeave={e=>e.currentTarget.style.borderColor=X.bdr}>
              <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:10 }}>
                <div style={{ width:38, height:38, borderRadius:10, background:u.bg, display:"flex", alignItems:"center", justifyContent:"center", fontSize:20 }}>{u.icon}</div>
                <div>
                  <div style={{ fontSize:14, fontWeight:700, color:X.t1 }}>{u.title}</div>
                  <div style={{ fontSize:11, color:X.t2, lineHeight:1.4, marginTop:2 }}>{u.subtitle}</div>
                </div>
              </div>
              <div style={{ display:"flex", gap:6, marginBottom:14, flexWrap:"wrap" }}>
                <Badge text={u.client.tier} color={u.color}/>
                <Badge text={"AUM: "+u.client.aum} color={X.t1} bg={X.surf}/>
                <Badge text={u.client.riskProfile} color={X.t2} bg={X.surf}/>
              </div>
              <button onClick={()=>runDemo(i)} style={{ width:"100%", padding:"9px", borderRadius:10, border:"none", background:u.color, color:"#fff", fontSize:12, fontWeight:700, cursor:"pointer", letterSpacing:".02em" }}>Launch Demo &rarr;</button>
            </div>
          ))}
        </div>
      )}

      {running!==null && uc && (

                  </div>
                  <div style={{ display:"flex", gap:12, marginBottom:14 }}>
                    <div style={{ flex:1, textAlign:"center", background:X.card, borderRadius:10, padding:"10px 8px", border:"1px solid "+X.bdr }}>
                      <div style={{ fontSize:8, color:X.t3, fontWeight:600, textTransform:"uppercase", marginBottom:2 }}>Before</div>
                      <div style={{ fontSize:18, fontWeight:800, color:X.red, fontFamily:mono }}>{uc.result.before}</div>
                      <div style={{ fontSize:9, color:X.t3 }}>{uc.result.metric}</div>
                    </div>
                    <div style={{ flex:1, textAlign:"center", background:X.card, borderRadius:10, padding:"10px 8px", border:"1px solid "+X.bdr }}>
                      <div style={{ fontSize:8, color:X.t3, fontWeight:600, textTransform:"uppercase", marginBottom:2 }}>After</div>
                      <div style={{ fontSize:18, fontWeight:800, color:X.green, fontFamily:mono }}>{uc.result.after}</div>
                      <div style={{ fontSize:9, color:X.t3 }}>{uc.result.metric}</div>
                    </div>
                  </div>
                  {!claimed ? (
                    <button onClick={()=>setClaimed(true)} style={{ width:"100%", padding:"10px", borderRadius:10, border:"none", background:uc.color, color:"#fff", fontSize:12, fontWeight:700, cursor:"pointer" }}>{uc.offer.cta} &rarr;</button>
                  ) : (
                    <div style={{ textAlign:"center", padding:"10px", borderRadius:10, background:X.greenB, border:"1px solid "+X.green+"22" }}>
                      <span style={{ fontSize:16 }}>{"\u2705"}</span>
                      <div style={{ fontSize:12, fontWeight:700, color:X.green, marginTop:2 }}>Action Confirmed</div>
                    </div>
                  )}
                </div>
              </div>
            )}

            {demoTab==="data" && (
              <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
                <div style={{ fontSize:10, fontWeight:700, color:X.t3, letterSpacing:".06em", textTransform:"uppercase", marginBottom:4 }}>Pipeline Data Flow</div>
                {uc.steps.map((st,i)=>{
                  const state=stepStates[i]||"pending";
                  if(state==="pending") return null;
                  return (
                    <div key={i} className="si" style={{ animationDelay:i*.04+"s" }}>
                      <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:6 }}>
                        <span style={{ fontSize:14 }}>{PIPELINE[i].icon}</span>
                        <span style={{ fontSize:11, fontWeight:700, color:X.t1 }}>{PIPELINE[i].agent}</span>
                        <Badge text={"Step "+(i+1)} color={PIPELINE[i].color} style={{ fontSize:8 }}/>
                      </div>
                      <DataBlock entries={st.d} color={PIPELINE[i].color}/>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        </div>
      )}
    </section>
  );
}

      <div style={{ display:"flex", alignItems:"center", gap:12 }}>
        <XperionLogo size={16}/>
        <div style={{ width:1, height:18, background:X.bdr2 }}/>
        <div>
          <div style={{ fontSize:12, fontWeight:700, color:X.t1 }}>FinNexus</div>
          <div style={{ fontSize:10, color:X.t3 }}>AI-Powered Real-Time Personalization for Banking &amp; Wealth</div>
        </div>

      <div style={{ fontSize:10, color:X.t3 }}>&copy; 2026 Coforge &middot; xPerion Marketplace &middot; All rights reserved</div>

  return (
    <div style={{ minHeight:"100vh", background:X.bg }}>
      <Header/>
      <Hero/>

</script>
